name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build packages
        run: |
          rm -f dist/*
          bash build-pkg.sh

      - name: Extract version
        id: version
        run: |
          VER=$(tr -d '[:space:]' < ucode/template/themes/glass/version)
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "ipk=luci-theme-glass_${VER}-1_all.ipk" >> "$GITHUB_OUTPUT"
          echo "apk=luci-theme-glass-${VER}-r1.apk" >> "$GITHUB_OUTPUT"

      - name: Generate and sign opkg Packages index
        env:
          USIGN_SEC_KEY: ${{ secrets.USIGN_SEC_KEY }}
        run: |
          cd dist
          IPK="${{ steps.version.outputs.ipk }}"

          # Extract control info from IPK
          mkdir -p _tmp
          tar xzf "$IPK" -C _tmp ./control.tar.gz
          tar xzf _tmp/control.tar.gz -C _tmp ./control

          # Build Packages index
          cat _tmp/control > Packages
          echo "Filename: $IPK" >> Packages
          echo "Size: $(stat -c%s "$IPK")" >> Packages
          echo "SHA256sum: $(sha256sum "$IPK" | cut -d' ' -f1)" >> Packages
          echo "" >> Packages

          gzip -k Packages

          # Sign with usign key (signify-openbsd is compatible)
          # opkg verifies sig against the uncompressed Packages file saved to /var/opkg-lists/
          sudo apt-get install -y -qq signify-openbsd >/dev/null 2>&1
          echo "$USIGN_SEC_KEY" > _tmp/glass.sec
          signify-openbsd -S -s _tmp/glass.sec -m Packages -x Packages.sig
          echo "Packages signed successfully"
          cat Packages.sig

          rm -rf _tmp

      - name: Generate and sign apk packages.adb index
        env:
          APK_SEC_KEY: ${{ secrets.APK_SEC_KEY }}
        run: |
          APK="${{ steps.version.outputs.apk }}"
          mkdir -p dist/apk_staging
          cp "dist/$APK" dist/apk_staging/

          # Write RSA private key (name must match public key for apk to match)
          echo "$APK_SEC_KEY" > dist/apk_staging/glass-apk.rsa
          chmod 600 dist/apk_staging/glass-apk.rsa

          # Generate and sign packages.adb using the same Alpine container
          docker run --rm \
            -v "$PWD/dist/apk_staging:/repo" \
            alpine:latest sh -c "
              cd /repo
              apk mkndx --allow-untrusted \
                --sign-key /repo/glass-apk.rsa \
                -o packages.adb \
                *.apk 2>&1
            "

          # Remove private key from staging dir
          rm -f dist/apk_staging/glass-apk.rsa

          ls -la dist/apk_staging/

      - name: Deploy package repo to gh-pages
        run: |
          VER="${{ steps.version.outputs.version }}"
          IPK="${{ steps.version.outputs.ipk }}"
          APK="${{ steps.version.outputs.apk }}"

          # Save artifacts before branch switch
          cp -r dist /tmp/dist-save

          # Configure git
          git config user.name "Ryan Chen"
          git config user.email "rchen14b@gmail.com"

          # Checkout gh-pages
          git fetch origin gh-pages
          git checkout gh-pages

          # opkg feed
          mkdir -p packages
          cp "/tmp/dist-save/$IPK" packages/
          cp /tmp/dist-save/Packages packages/
          cp /tmp/dist-save/Packages.gz packages/
          cp /tmp/dist-save/Packages.sig packages/
          # Remove old versions
          find packages -name '*.ipk' ! -name "$IPK" -delete

          # apk feed — serve packages.adb at root (user points to full URL)
          mkdir -p apk
          cp "/tmp/dist-save/$APK" apk/
          cp /tmp/dist-save/apk_staging/packages.adb apk/ 2>/dev/null || true
          # Remove old versions
          find apk -name '*.apk' ! -name "$APK" -delete

          # Update demo page (index.html) — rewrite both the jsdelivr CDN tag
          # and the hardcoded login-version text so the live demo always
          # reflects the latest tag.
          if [ -f index.html ]; then
            sed -i -E \
              -e "s|@v[0-9]+\.[0-9]+\.[0-9]+|@v${VER}|g" \
              -e "s|GlassTheme v[0-9]+\.[0-9]+\.[0-9]+|GlassTheme v${VER}|g" \
              index.html
          fi

          # Commit and push
          git add packages/ apk/ index.html 2>/dev/null || true
          git commit -m "Update package repo: v${VER}" || echo "No changes"
          git push origin gh-pages

      - name: Deploy to GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy Pages
        uses: actions/deploy-pages@v4

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VER="${{ steps.version.outputs.version }}"
          IPK="/tmp/dist-save/${{ steps.version.outputs.ipk }}"
          APK="/tmp/dist-save/${{ steps.version.outputs.apk }}"

          # Check if release already exists (preserve manually edited notes)
          if gh release view "v${VER}" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release v${VER} exists — uploading assets only (preserving notes)"
            gh release upload "v${VER}" "$IPK" "$APK" --clobber
          else
            echo "Creating new release v${VER}"
            # Extract notes from commit body
            git checkout "$GITHUB_SHA" -- 2>/dev/null || true
            BODY=$(git log -1 --format='%b' "$GITHUB_SHA" 2>/dev/null || echo "")

            cat > /tmp/release-notes.md <<NOTES_EOF
          ${BODY}

          ## Install

          ### From package repository (auto-update)

          **opkg (OpenWrt 24.10 and earlier):**
          \`\`\`sh
          echo "src/gz glass https://rchen14b.github.io/luci-theme-glass/packages" >> /etc/opkg/customfeeds.conf
          opkg update
          opkg install luci-theme-glass
          \`\`\`

          **apk (OpenWrt 25.12+):**
          \`\`\`sh
          # First install: fetch signing public key (one-time)
          wget -O /etc/apk/keys/glass-apk.rsa.pub \
            https://raw.githubusercontent.com/rchen14b/luci-theme-glass/main/root/etc/apk/keys/glass-apk.rsa.pub

          # Add feed and install
          echo "https://rchen14b.github.io/luci-theme-glass/apk/packages.adb" > /etc/apk/repositories.d/glass.list
          apk update
          apk add luci-theme-glass
          \`\`\`

          ### From release (manual)
          - **apk**: \`apk add --allow-untrusted luci-theme-glass-${VER}-r1.apk\`
          - **opkg**: \`opkg install luci-theme-glass_${VER}-1_all.ipk\`
          NOTES_EOF

            gh release create "v${VER}" "$IPK" "$APK" \
              --title "v${VER}" \
              --notes-file /tmp/release-notes.md
          fi
