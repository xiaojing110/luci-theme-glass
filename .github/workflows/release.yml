name: Build and Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      ipk: ${{ steps.version.outputs.ipk }}
      apk: ${{ steps.version.outputs.apk }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Docker Alpine image
        uses: actions/cache@v4
        with:
          path: /tmp/docker-alpine.tar
          key: docker-alpine-${{ hashFiles('build-pkg.sh') }}
          restore-keys: |
            docker-alpine-

      - name: Load cached Docker image
        run: |
          if [ -f /tmp/docker-alpine.tar ]; then
            docker load -i /tmp/docker-alpine.tar
            echo "Loaded cached Alpine image"
          fi

      - name: Pull Docker image
        run: |
          docker pull alpine:latest
          docker save alpine:latest -o /tmp/docker-alpine.tar

      - name: Build packages
        run: |
          rm -f dist/*
          bash build-pkg.sh

      - name: Extract version
        id: version
        run: |
          VER=$(tr -d '[:space:]' < ucode/template/themes/glass/version)
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "ipk=luci-theme-glass_${VER}-1_all.ipk" >> "$GITHUB_OUTPUT"
          echo "apk=luci-theme-glass-${VER}-r1.apk" >> "$GITHUB_OUTPUT"

      - name: Save build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          retention-days: 1

  sign-and-deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for gh-pages)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: dist/

      - name: Generate and sign opkg Packages index
        env:
          USIGN_SEC_KEY: ${{ secrets.USIGN_SEC_KEY }}
        run: |
          cd dist
          IPK="${{ needs.build.outputs.ipk }}"

          mkdir -p _tmp
          tar xzf "$IPK" -C _tmp ./control.tar.gz
          tar xzf _tmp/control.tar.gz -C _tmp ./control

          # Build Packages index
          cat _tmp/control > Packages
          echo "Filename: $IPK" >> Packages
          echo "Size: $(stat -c%s "$IPK")" >> Packages
          echo "SHA256sum: $(sha256sum "$IPK" | cut -d' ' -f1)" >> Packages
          echo "" >> Packages

          gzip -k Packages

          # Sign with usign key (signify-openbsd is compatible)
          sudo apt-get install -y -qq signify-openbsd >/dev/null 2>&1
          echo "$USIGN_SEC_KEY" > _tmp/glass.sec
          signify-openbsd -S -s _tmp/glass.sec -m Packages -x Packages.sig
          echo "Packages signed successfully ✅"

          rm -rf _tmp

      - name: Cache Docker Alpine image (apk signing)
        uses: actions/cache@v4
        with:
          path: /tmp/docker-alpine-sign.tar
          key: docker-alpine-sign-${{ hashFiles('build-pkg.sh') }}
          restore-keys: |
            docker-alpine-sign-

      - name: Load cached Docker image
        run: |
          if [ -f /tmp/docker-alpine-sign.tar ]; then
            docker load -i /tmp/docker-alpine-sign.tar
          else
            docker pull alpine:latest
            docker save alpine:latest -o /tmp/docker-alpine-sign.tar
          fi

      - name: Generate and sign apk packages.adb index
        env:
          APK_SEC_KEY: ${{ secrets.APK_SEC_KEY }}
        run: |
          APK="${{ needs.build.outputs.apk }}"
          mkdir -p dist/apk_staging
          cp "dist/$APK" dist/apk_staging/ 2>/dev/null || true

          echo "$APK_SEC_KEY" > dist/apk_staging/glass-apk.rsa
          chmod 600 dist/apk_staging/glass-apk.rsa

          docker run --rm \
            -v "$PWD/dist/apk_staging:/repo" \
            alpine:latest sh -c "
              cd /repo
              apk mkndx --allow-untrusted \
                --sign-key /repo/glass-apk.rsa \
                -o packages.adb \
                *.apk 2>&1
            "

          rm -f dist/apk_staging/glass-apk.rsa
          echo "APK index signed successfully ✅"

      - name: Deploy package repo to gh-pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VER="${{ needs.build.outputs.version }}"
          IPK="${{ needs.build.outputs.ipk }}"
          APK="${{ needs.build.outputs.apk }}"

          cp -r dist /tmp/dist-save

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin gh-pages
          git checkout gh-pages

          # opkg feed
          mkdir -p packages
          cp "/tmp/dist-save/$IPK" packages/
          cp /tmp/dist-save/Packages packages/
          cp /tmp/dist-save/Packages.gz packages/
          cp /tmp/dist-save/Packages.sig packages/
          find packages -name '*.ipk' ! -name "$IPK" -delete

          # apk feed
          mkdir -p apk
          cp "/tmp/dist-save/$APK" apk/ 2>/dev/null || true
          cp /tmp/dist-save/apk_staging/packages.adb apk/ 2>/dev/null || true
          find apk -name '*.apk' ! -name "$APK" -delete

          # Update demo page version references
          if [ -f index.html ]; then
            sed -i -E \
              -e "s|@v[0-9]+\.[0-9]+\.[0-9]+|@v${VER}|g" \
              -e "s|GlassTheme v[0-9]+\.[0-9]+\.[0-9]+|GlassTheme v${VER}|g" \
              index.html
          fi

          git add packages/ apk/ index.html 2>/dev/null || true
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update package repo: v${VER}"
          git push origin gh-pages

      - name: Deploy to GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy Pages
        uses: actions/deploy-pages@v4

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VER="${{ needs.build.outputs.version }}"
          IPK="/tmp/dist-save/${{ needs.build.outputs.ipk }}"
          APK="/tmp/dist-save/${{ needs.build.outputs.apk }}"

          if gh release view "v${VER}" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release v${VER} exists — uploading assets only"
            gh release upload "v${VER}" "$IPK" "$APK" --clobber
          else
            echo "Creating new release v${VER}"
            BODY=$(git log -1 --format='%b' "$GITHUB_SHA" 2>/dev/null || echo "")

            cat > /tmp/release-notes.md <<NOTES_EOF
          ${BODY}

          ## Install

          ### From package repository (auto-update)

          **opkg (OpenWrt 24.10 and earlier):**
          \`\`\`sh
          echo "src/gz glass https://rchen14b.github.io/luci-theme-glass/packages" >> /etc/opkg/customfeeds.conf
          opkg update
          opkg install luci-theme-glass
          \`\`\`

          **apk (OpenWrt 25.12+):**
          \`\`\`sh
          wget -O /etc/apk/keys/glass-apk.rsa.pub \
            https://raw.githubusercontent.com/rchen14b/luci-theme-glass/main/root/etc/apk/keys/glass-apk.rsa.pub
          echo "https://rchen14b.github.io/luci-theme-glass/apk/packages.adb" > /etc/apk/repositories.d/glass.list
          apk update
          apk add luci-theme-glass
          \`\`\`

          ### From release (manual)
          - **apk**: \`apk add --allow-untrusted luci-theme-glass-${VER}-r1.apk\`
          - **opkg**: \`opkg install luci-theme-glass_${VER}-1_all.ipk\`
          NOTES_EOF

            gh release create "v${VER}" "$IPK" "$APK" \
              --title "v${VER}" \
              --notes-file /tmp/release-notes.md
          fi
